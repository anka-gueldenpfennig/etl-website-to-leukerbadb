name: Update webcontent

on:
  schedule:
    # Once a week (Monday at 8 am UTC) 
    - cron: "0 2 * * 6"
  workflow_dispatch: {}
  push:
    branches: [ main ]

concurrency:
  group: update-webcontent
  cancel-in-progress: false

jobs:
  scrape-and-upsert:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # Map GitHub repo secrets into environment vars script reads
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run Main Website ETL 
        id: main
        continue-on-error: true
        run: python scripts/scrape_all.py 

      - name: Run OA ETL 
        id: oa
        continue-on-error: true
        run: python scripts/scrape_oa_tours.py 

      - name: Run Events ETL 
        id: events
        continue-on-error: true
        run: python scripts/scrape_events.py

      - name: Fail if any ETL failed
        if: always() && (
          steps.main.outcome == 'failure' ||
          steps.oa.outcome == 'failure' ||
          steps.events.outcome == 'failure'
          )
        run: exit 1