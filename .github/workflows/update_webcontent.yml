name: Update webcontent

on:
  schedule:
    # Once a week (Monday at 8 am UTC) 
    - cron: "0 8 * * 1"
  workflow_dispatch: {}
  push:
    branches: [ main ]

concurrency:
  group: update-webcontent
  cancel-in-progress: false

jobs:
  scrape-and-upsert:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Map GitHub repo secrets into environment vars script reads
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Run ETL
        run: |
          python scripts/scrape_all.py